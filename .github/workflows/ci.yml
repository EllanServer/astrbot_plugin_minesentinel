name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate config schema
        run: python -m json.tool _conf_schema.json > /dev/null

      - name: Compile sources
        run: python -m compileall __init__.py handlers main.py services

      - name: Run tests
        run: python -m unittest discover -s tests

  package:
    name: Package plugin
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugin
        run: |
          mkdir -p dist
          git ls-files ':!.github/*' | zip -@ dist/astrbot_plugin_minecraft_adapter.zip

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: astrbot_plugin_minecraft_adapter
          path: dist/astrbot_plugin_minecraft_adapter.zip
          if-no-files-found: error
