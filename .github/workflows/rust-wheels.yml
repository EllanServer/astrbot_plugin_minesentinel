name: Build Rust wheels

on:
  push:
    branches:
      - main
      - master
      - pyo3-mine-sentinel
    tags:
      - "v*"
  pull_request:
    paths:
      - "rust/**"
      - "pyproject.toml"
      - ".github/workflows/rust-wheels.yml"
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to upload release assets

jobs:
  build-wheels:
    name: Build wheel · ${{ matrix.platform.label }} · cp${{ matrix.python-version }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        # Python 3.10–3.14: covers AstrBot's supported range and the
        # versions users actually run. PyO3 0.29 natively supports all of
        # them, so we ship one tagged wheel per CPython version (no abi3,
        # because abi3 wheels can't expose Python-specific features and
        # the per-version cost is just one extra CI cell).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          # `target` is the Rust target triple used to install the toolchain
          # so cross-compilation works on non-native runners (e.g. aarch64
          # on linux-arm runner). Native runners (x86_64 linux/windows,
          # arm64 macos) don't strictly need it but specifying keeps the
          # build deterministic.
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Select maturin interpreter
        id: maturin-interpreter
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "value=python${{ matrix.python-version }}" >> "$GITHUB_OUTPUT"
          else
            python -c "import pathlib, sys; print(f'value={pathlib.Path(sys.executable).as_posix()}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Avoid importing the plugin's top-level platform/ package when
          # maturin probes Python metadata and expects stdlib platform.
          working-directory: rust
          target: ${{ matrix.platform.target }}
          args: --release --out ../dist -i ${{ steps.maturin-interpreter.outputs.value }}
          # manylinux only applies to linux; maturin ignores it on
          # macos/windows. `auto` lets maturin pick the lowest manylinux
          # tag that the built wheel's symbols allow, maximizing
          # compatibility across distros.
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mine_sentinel_rs-wheel-${{ matrix.platform.label }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: rust
          args: --out ../dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: mine_sentinel_rs-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Release to GitHub
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
