name: Build Rust wheels

on:
  push:
    branches:
      - main
      - master
      - pyo3-mine-sentinel
    tags:
      - "v*"
  pull_request:
    paths:
      - "rust/**"
      - "pyproject.toml"
      - ".github/workflows/rust-wheels.yml"
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to upload release assets

jobs:
  build-wheels:
    name: Build wheel · ${{ matrix.platform.label }} · cp${{ matrix.python-version }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        # Python 3.10–3.14: covers AstrBot's supported range and the
        # versions users actually run. PyO3 0.29 natively supports all of
        # them, so we ship one tagged wheel per CPython version (no abi3,
        # because abi3 wheels can't expose Python-specific features and
        # the per-version cost is just one extra CI cell).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          # `target` is the Rust target triple used to install the toolchain
          # so cross-compilation works on non-native runners (e.g. aarch64
          # on linux-arm runner). Native runners (x86_64 linux/windows,
          # arm64 macos) don't strictly need it but specifying keeps the
          # build deterministic.
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Select maturin interpreter
        id: maturin-interpreter
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "value=python${{ matrix.python-version }}" >> "$GITHUB_OUTPUT"
          else
            python -c "import pathlib, sys; print(f'value={pathlib.Path(sys.executable).as_posix()}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Rust compile check
        shell: bash
        run: |
          set +e
          cargo check --manifest-path rust/Cargo.toml --target "${{ matrix.platform.target }}" 2>&1 | tee rust-check.log
          status=${PIPESTATUS[0]}
          {
            echo "### cargo check · ${{ matrix.platform.label }} · cp${{ matrix.python-version }}"
            echo
            echo '```text'
            tail -n 160 rust-check.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$status" -ne 0 ]]; then
            message="$(tail -n 80 rust-check.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\r'/'%0D'}"
            message="${message//$'\n'/'%0A'}"
            echo "::error title=cargo check failed::$message"
          fi
          exit "$status"

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Keep metadata probing isolated from the plugin runtime; maturin only
          # needs the Rust crate in this step.
          working-directory: rust
          target: ${{ matrix.platform.target }}
          args: --release --out ../dist -i ${{ steps.maturin-interpreter.outputs.value }}
          # manylinux only applies to linux; maturin ignores it on
          # macos/windows. `auto` lets maturin pick the lowest manylinux
          # tag that the built wheel's symbols allow, maximizing
          # compatibility across distros.
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: mine_sentinel_rs-wheel-${{ matrix.platform.label }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path rust/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: mine_sentinel_rs-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Release to GitHub
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Build plugin package
        run: python scripts/package_plugin.py --output dist/release/astrbot_plugin_minecraft_adapter.zip

      - name: Validate release assets and write checksums
        shell: bash
        run: |
          set -euo pipefail
          python -m zipfile -t dist/release/astrbot_plugin_minecraft_adapter.zip
          for wheel in dist/release/*.whl; do
            python -m zipfile -t "$wheel"
          done
          cd dist/release
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\n' \
            | LC_ALL=C sort \
            | while IFS= read -r file; do sha256sum "$file"; done \
            > SHA256SUMS.txt
          test -s SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/release/astrbot_plugin_minecraft_adapter.zip
            dist/release/*.whl
            dist/release/*.tar.gz
            dist/release/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
